global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: 'inventory-api'
    env:     'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Production app metrics
  - job_name: 'inventory-api-prod'
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8082']
    labels:
      env: production

  # Staging app metrics
  - job_name: 'inventory-api-staging'
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8081']
    labels:
      env: staging
