# ── SonarQube Project Configuration ─────────────────────────────────────────
sonar.projectKey=inventory-api
sonar.projectName=Inventory Management API
sonar.projectVersion=1.0

# Source & test paths
sonar.sources=src/InventoryAPI
sonar.tests=tests/InventoryAPI.Tests

# Coverage report (generated by coverlet in Test stage)
sonar.cs.opencover.reportsPaths=TestResults/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=TestResults/**/*.trx

# Exclusions — don't count auto-generated / migration code
sonar.coverage.exclusions=\
  **/Program.cs,\
  **/Migrations/**,\
  **/*DbContext.cs,\
  **/appsettings*.json

sonar.exclusions=\
  **/bin/**,\
  **/obj/**,\
  **/Migrations/**

# Quality Gate thresholds (must match the gate configured in SonarQube UI)
# Coverage minimum: 70%
# Duplicated lines: < 5%
# Maintainability rating: A
# Reliability rating: A
# Security rating: A

sonar.qualitygate.wait=true

# Language
sonar.language=cs
sonar.sourceEncoding=UTF-8
